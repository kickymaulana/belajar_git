<style>
  .tombol-link {
  display: inline-block;
  padding: 10px 20px;
  background-color: #007bff; /* Warna biru */
  color: white;
  text-decoration: none; /* Menghilangkan garis bawah link */
  border-radius: 5px; /* Membuat sudut melengkung */
  font-family: Arial, sans-serif;
  font-weight: bold;
  transition: background 0.3s;
}

/* Efek saat kursor diarahkan ke tombol */
.tombol-link:hover {
  background-color: #0056b3; /* Warna biru lebih gelap */
}
</style>
  
  <body>
  <a href="https://fakhrybabyshop.rafkaf.com/" class="tombol-link" target="_blank">Klik di Sini</a>
  <p>widia cina</p>
  </body>
